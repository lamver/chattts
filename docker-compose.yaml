services:
  xtts-api-server:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.10-slim
        WORKDIR /app
        RUN apt-get update && apt-get install -y --no-install-recommends \
            git \
            curl \
            ffmpeg \
            build-essential \
            && rm -rf /var/lib/apt/lists/*
        RUN pip install --no-cache-dir torch --index-url https://pytorch.org
        RUN pip install --no-cache-dir xtts-api-server
        EXPOSE 8020
        ENV HOST=0.0.0.0
        ENV PORT=8020
        ENV DEVS=cpu
        # Добавляем флаг --hs для принудительного запуска веб-интерфейса (Share/Dashboard)
        CMD ["python", "-m", "xtts_api_server", "--hs"]
    container_name: xtts-api-server
    ports:
      - "8020:8020"
    volumes:
      - xtts-models:/app/models
      - xtts-speakers:/app/speakers
    restart: always

volumes:
  xtts-models:
  xtts-speakers: