services:
  xtts-api-server:
    image: daswer123/xtts-api-server:latest
    container_name: xtts-api-server
    ports:
      - "8020:8020"
    volumes:
      - ./xtts_models:/app/models
      - ./xtts_speakers:/app/speakers
    environment:
      - HOST=0.0.0.0
      - PORT=8020
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always