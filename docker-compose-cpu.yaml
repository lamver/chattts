services:
  chattts-ui:
    build:
      context: https://github.com
      dockerfile: Dockerfile
    container_name: chattts-ui
    #ports:
    #  - "9966:9966"
    volumes:
      - chattts-data:/app/data
      - chattts-models:/root/.cache/huggingface
    environment:
      - WEB_ADDRESS=0.0.0.0:9966
      - CHATTTS_REUSE=1
    restart: always

volumes:
  chattts-data:
  chattts-models: